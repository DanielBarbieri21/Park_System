name: ci

on:
  push:
    branches: [ main, master, 'codex/**' ]
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Estacionamento.sln

      - name: Build
        run: dotnet build Estacionamento.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Estacionamento.Tests/Estacionamento.Tests.csproj --configuration Release --no-build --verbosity normal
